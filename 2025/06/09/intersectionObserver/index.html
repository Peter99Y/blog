                    <h5 id="加载更多"><a href="#加载更多" class="headerlink" title="加载更多"></a>加载更多</h5><figure class="highlight javascript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">const</span> isLoading = <span class="literal">false</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">// 创建重叠度观察器</span></span><br><span class="line"><span class="keyword">let</span> ob = <span class="keyword">new</span> <span class="title class_">IntersectionObserver</span>(</span><br><span class="line">  <span class="function">(<span class="params">entries</span>) =&gt;</span> &#123;</span><br><span class="line">    <span class="comment">// entries为数组，数组是调用observe方法所观察的元素数组</span></span><br><span class="line">    <span class="keyword">for</span> (<span class="keyword">const</span> entry <span class="keyword">of</span> entries) &#123;</span><br><span class="line">      <span class="keyword">if</span> (entry.<span class="property">isIntersecting</span>) &#123;</span><br><span class="line">        <span class="keyword">if</span> (!isLoading) &#123;</span><br><span class="line">          isLoading = <span class="literal">true</span>;</span><br><span class="line">          <span class="title function_">loadMore</span>();</span><br><span class="line">          isLoading = <span class="literal">false</span>;</span><br><span class="line">        &#125;</span><br><span class="line">      &#125;</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;,</span><br><span class="line">  &#123;</span><br><span class="line">    <span class="attr">root</span>: <span class="literal">null</span>, <span class="comment">// 观察与某个元素的交集，默认null是视口</span></span><br><span class="line">    <span class="attr">threshold</span>: <span class="number">0.5</span>, <span class="comment">// 重叠阈值，默认为0.5</span></span><br><span class="line">  &#125;</span><br><span class="line">);</span><br><span class="line"></span><br><span class="line"><span class="keyword">let</span> observedDom = <span class="variable language_">document</span>.<span class="title function_">querySelector</span>(<span class="string">&quot;.loading&quot;</span>); <span class="comment">// 需要观察的元素</span></span><br><span class="line">ob.<span class="title function_">observe</span>(observedDom);</span><br><span class="line"></span><br><span class="line"><span class="keyword">function</span> <span class="title function_">loadMore</span>(<span class="params"></span>) &#123;</span><br><span class="line">  <span class="variable language_">console</span>.<span class="title function_">log</span>(<span class="string">&quot;loadMore&quot;</span>);</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<h5 id="图片懒加载"><a href="#图片懒加载" class="headerlink" title="图片懒加载"></a>图片懒加载</h5><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br></pre></td><td class="code"><pre><span class="line">&lt;template&gt;</span><br><span class="line">  &lt;div style=&quot;overflow-y: auto&quot;&gt;</span><br><span class="line">    &lt;img v-lazy=&quot;it&quot; width=&quot;375&quot; height=&quot;400&quot; v-for=&quot;it of imgArr&quot; /&gt;</span><br><span class="line">  &lt;/div&gt;</span><br><span class="line">&lt;/template&gt;</span><br><span class="line"></span><br><span class="line">&lt;script setup&gt;</span><br><span class="line">// 引入所有静态文件 glob引入默认是懒加载模式，eager:true 静态加载,否则是懒加载;</span><br><span class="line">let imgList = import.meta.glob(&quot;../assets/images/*.*&quot;, &#123; eager: true &#125;);</span><br><span class="line">let imgArr = Object.values(imgList).map((i) =&gt; i.default);</span><br><span class="line"></span><br><span class="line">let vLazy = async (el, binding) =&gt; &#123;</span><br><span class="line">  // 1.先设置默认展位图片</span><br><span class="line">  const defaultImg = await import(&quot;../assets/vue.svg&quot;);</span><br><span class="line">  el.src = defaultImg.default;</span><br><span class="line"></span><br><span class="line">  const observer = new IntersectionObserver((entries) =&gt; &#123;</span><br><span class="line">    if (entries[0].isIntersecting) &#123;</span><br><span class="line">      el.src = binding.value;</span><br><span class="line">      observer.unobserve(el); // 取消监听元素</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;);</span><br><span class="line">  observer.observe(el); // 开始监听某个元素</span><br><span class="line">&#125;;</span><br><span class="line">&lt;/script&gt;</span><br></pre></td></tr></table></figure>

<h5 id="元素滑动进入视图"><a href="#元素滑动进入视图" class="headerlink" title="元素滑动进入视图"></a>元素滑动进入视图</h5><figure class="highlight javascript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// vSlideAnimation.js</span></span><br><span class="line"><span class="keyword">const</span> <span class="variable constant_">DISTANCE</span> = <span class="number">100</span>;</span><br><span class="line"><span class="keyword">const</span> <span class="variable constant_">DURATION</span> = <span class="number">200</span>;</span><br><span class="line"><span class="keyword">const</span> map = <span class="keyword">new</span> <span class="title class_">WeakMap</span>();</span><br><span class="line"></span><br><span class="line"><span class="keyword">const</span> observer = <span class="keyword">new</span> <span class="title class_">IntersectionObserver</span>(<span class="function">(<span class="params">entries</span>) =&gt;</span> &#123;</span><br><span class="line">  entries.<span class="title function_">forEach</span>(<span class="function">(<span class="params">entry</span>) =&gt;</span> &#123;</span><br><span class="line">    <span class="keyword">if</span> (entry.<span class="property">isIntersecting</span>) &#123;</span><br><span class="line">      <span class="keyword">const</span> animation = map.<span class="title function_">get</span>(entry.<span class="property">target</span>);</span><br><span class="line">      animation &amp;&amp; animation.<span class="title function_">play</span>();</span><br><span class="line">      observer.<span class="title function_">unobserve</span>(entry.<span class="property">target</span>);</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;);</span><br><span class="line">&#125;);</span><br><span class="line"></span><br><span class="line"><span class="comment">// 获取元素是否在视口内</span></span><br><span class="line"><span class="keyword">function</span> <span class="title function_">isInnerViewport</span>(<span class="params">el</span>) &#123;</span><br><span class="line">  <span class="comment">// 获取元素相对于视口的距离信息对象</span></span><br><span class="line">  <span class="keyword">const</span> rect = el.<span class="title function_">getBoundingClientRect</span>();</span><br><span class="line">  <span class="comment">// 元素的上边距离减去视口高度是否大于0， 在视口上方的距离大于视口高度，则元素不在视口内</span></span><br><span class="line">  <span class="keyword">return</span> rect.<span class="property">top</span> - <span class="variable language_">window</span>.<span class="property">innerHeight</span> &gt; <span class="number">0</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">export</span> <span class="keyword">const</span> vSlideAnimation = &#123;</span><br><span class="line">  <span class="title function_">mounted</span>(<span class="params">el</span>) &#123;</span><br><span class="line">    <span class="keyword">if</span> (!<span class="title function_">isInnerViewport</span>(el)) <span class="keyword">return</span>;</span><br><span class="line"></span><br><span class="line">    <span class="comment">// 给元素设置动画对象，并返回动画对象实例</span></span><br><span class="line">    <span class="keyword">const</span> animation = el.<span class="title function_">animate</span>(</span><br><span class="line">      [</span><br><span class="line">        &#123; <span class="attr">transform</span>: <span class="string">`translateY(<span class="subst">$&#123;DISTANCE&#125;</span>px)`</span> &#125;,</span><br><span class="line">        &#123; <span class="attr">transform</span>: <span class="string">&quot;translateY(0)&quot;</span> &#125;,</span><br><span class="line">      ],</span><br><span class="line">      &#123;</span><br><span class="line">        <span class="attr">duration</span>: <span class="variable constant_">DURATION</span>,</span><br><span class="line">        <span class="attr">ease</span>: <span class="string">&quot;ease&quot;</span>,</span><br><span class="line">        <span class="attr">fill</span>: <span class="string">&quot;forwards&quot;</span>,</span><br><span class="line">      &#125;</span><br><span class="line">    );</span><br><span class="line"></span><br><span class="line">    animation.<span class="title function_">pause</span>();</span><br><span class="line">    observer.<span class="title function_">observe</span>(el);</span><br><span class="line">    map.<span class="title function_">set</span>(el, animation);</span><br><span class="line">  &#125;,</span><br><span class="line">  <span class="title function_">onMounted</span>(<span class="params">el</span>) &#123;</span><br><span class="line">    observer.<span class="title function_">disconnect</span>(el);</span><br><span class="line">  &#125;,</span><br><span class="line">&#125;;</span><br></pre></td></tr></table></figure>
